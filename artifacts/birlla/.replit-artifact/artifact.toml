kind = "web"
previewPath = "/"
title = "Birlla Beauty"
version = "1.0.0"
id = "artifacts/birlla"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24006

[services.development]
run = "pnpm --filter @workspace/birlla run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birlla", "run", "build" ]
publicDir = "artifacts/birlla/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24006"
BASE_PATH = "/"
